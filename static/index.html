<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEC Tech Topics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>📡 CEC Tech Topics</h1>
      <span class="tagline">PC building &amp; gaming news radar</span>
      <button id="refresh-btn" class="btn refresh-btn"><span class="glyph">↻</span> Refresh</button>
      <button id="fetch-btn" class="btn fetch-btn"><span class="glyph">⟳</span> Fetch new topics</button>
      <span id="conn" class="conn" title="server connection">●</span>
    </div>
    <div id="fetchbar" class="fetchbar hidden"></div>
    <div class="tabsrow">
      <nav id="tabs" class="tabs"></nav>
      <div class="autoscroll">
        <button id="autoscroll-toggle" class="btn autoscroll-toggle" role="switch"
                aria-checked="false" title="ping-pong auto-scroll the feed">⤓ Auto-scroll</button>
        <input id="autoscroll-speed" class="autoscroll-speed" type="range"
               min="0" max="1000" step="1" value="400" title="scroll speed"
               aria-label="auto-scroll speed">
        <span id="autoscroll-readout" class="autoscroll-readout"></span>
      </div>
    </div>
  </header>

  <main id="list" class="list"></main>

  <aside id="jokes" class="jokes">
    <button id="jokes-toggle" class="jokes-toggle" title="hide jokes" aria-expanded="true">😂</button>
    <div class="jokes-panel">
      <div class="jokes-head">
        <span class="jokes-title">Jokes <span id="jokes-count" class="jokes-count"></span></span>
      </div>
      <div id="jokes-body" class="jokes-body"></div>
    </div>
  </aside>

  <script src="/static/app.js"></script>
</body>
</html>
